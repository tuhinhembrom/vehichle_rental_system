<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - RentRide</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f4f4;
}

/* Header */
header{
    background:#111;
    color:#fff;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 8%;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#ff9800;
}

nav a{
    color:#fff;
    text-decoration:none;
    margin-left:20px;
    transition:.3s;
}

nav a:hover{
    color:#ff9800;
}

/* Banner */
.banner{
    height:300px;
    background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
    url("https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=1500&q=80");
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.banner h1{
    font-size:50px;
}

/* Contact Section */
.contact{
    width:90%;
    max-width:1100px;
    margin:50px auto;
    display:flex;
    gap:30px;
    flex-wrap:wrap;
}

.contact-info,
.contact-form{
    flex:1;
    min-width:320px;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.contact-info h2,
.contact-form h2{
    color:#ff9800;
    margin-bottom:20px;
}

.contact-info p{
    margin-bottom:15px;
    line-height:1.7;
}

.contact-form label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

.contact-form input,
.contact-form textarea{
    width:100%;
    padding:12px;
    margin-bottom:20px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:16px;
}

.contact-form textarea{
    resize:none;
}

.contact-form button{
    width:100%;
    padding:14px;
    background:#ff9800;
    color:white;
    border:none;
    border-radius:5px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

.contact-form button:hover{
    background:#e68900;
}

/* Footer */
footer{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:40px;
}

/* Responsive */
@media(max-width:768px){

header{
    flex-direction:column;
}

nav{
    margin-top:15px;
}

nav a{
    display:block;
    margin:10px 0;
}

.banner h1{
    font-size:36px;
}

.contact{
    flex-direction:column;
}

}
</style>

</head>
<body>

<header>

<div class="logo">RentRide</div>

<nav>
<a href="index.html">Home</a>
<a href="vehicles.html">Vehicles</a>
<a href="booking.html">Booking</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
<a href="login.html">Login</a>
</nav>

</header>

<section class="banner">
<h1>Contact Us</h1>
</section>

<section class="contact">

<div class="contact-info">

<h2>Get In Touch</h2>

<p><strong>Address:</strong><br>
123 Main Road, Dhaka, Bangladesh
</p>

<p><strong>Phone:</strong><br>
+880 1712-345678
</p>

<p><strong>Email:</strong><br>
info@rentride.com
</p>

<p><strong>Working Hours:</strong><br>
Monday - Saturday<br>
9:00 AM - 8:00 PM
</p>

</div>

<div class="contact-form">

<h2>Send a Message</h2>

<form action="#">

<label>Full Name</label>
<input type="text" placeholder="Enter your name" required>

<label>Email Address</label>
<input type="email" placeholder="Enter your email" required>

<label>Subject</label>
<input type="text" placeholder="Enter subject" required>

<label>Message</label>
<textarea rows="6" placeholder="Write your message..." required></textarea>

<button type="submit">Send Message</button>

</form>

</div>

</section>

<footer>
<p>&copy; 2026 RentRide Vehicle Rental System | Designed by Tuhin</p>
</footer>
<script src="js/script.js"></script>
</body>
</html>
