<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking - RentRide</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f4f4;
}

/* Header */
header{
    background:#111;
    color:#fff;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 8%;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#ff9800;
}

nav a{
    color:#fff;
    text-decoration:none;
    margin-left:20px;
}

nav a:hover{
    color:#ff9800;
}

/* Booking Form */
.container{
    width:90%;
    max-width:700px;
    margin:50px auto;
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.container h2{
    text-align:center;
    margin-bottom:25px;
    color:#333;
}

.form-group{
    margin-bottom:18px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

.form-group input,
.form-group select,
.form-group textarea{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:16px;
}

.form-group textarea{
    resize:none;
}

button{
    width:100%;
    padding:14px;
    background:#ff9800;
    color:#fff;
    border:none;
    border-radius:5px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#e68900;
}

.back-home{
    text-align:center;
    margin-top:20px;
}

.back-home a{
    text-decoration:none;
    color:#ff9800;
    font-weight:bold;
}

/* Footer */
footer{
    background:#111;
    color:#fff;
    text-align:center;
    padding:20px;
    margin-top:40px;
}

@media(max-width:768px){

header{
    flex-direction:column;
}

nav{
    margin-top:15px;
}

nav a{
    display:block;
    margin:10px 0;
}

}
</style>

</head>
<body>

<header>
    <div class="logo">RentRide</div>

    <nav>
        <a href="index.html">Home</a>
        <a href="vehicles.html">Vehicles</a>
        <a href="booking.html">Booking</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="login.html">Login</a>
    </nav>
</header>

<div class="container">

    <h2>Book Your Vehicle</h2>

    <form action="#">

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your name" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" placeholder="Enter your phone number" required>
        </div>

        <div class="form-group">
            <label>Select Vehicle</label>
            <select required>
                <option value="">-- Select Vehicle --</option>
                <option>Toyota Corolla</option>
                <option>Honda Civic</option>
                <option>BMW X5</option>
                <option>Mercedes-Benz C-Class</option>
                <option>Yamaha R15</option>
                <option>Honda CBR</option>
                <option>Toyota Land Cruiser</option>
            </select>
        </div>

        <div class="form-group">
            <label>Pickup Date</label>
            <input type="date" required>
        </div>

        <div class="form-group">
            <label>Return Date</label>
            <input type="date" required>
        </div>

        <div class="form-group">
            <label>Pickup Location</label>
            <input type="text" placeholder="Enter pickup location" required>
        </div>

        <div class="form-group">
            <label>Additional Notes</label>
            <textarea rows="4" placeholder="Write your message..."></textarea>
        </div>

        <button type="submit">Confirm Booking</button>

    </form>

    <div class="back-home">
        <a href="index.html">← Back to Home</a>
    </div>

</div>

<footer>
    <p>&copy; 2026 RentRide Vehicle Rental System | Designed by Tuhin</p>
</footer>
<script src="js/script.js"></script>
</body>
</html>
